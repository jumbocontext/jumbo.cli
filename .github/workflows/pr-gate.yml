name: PR Gate

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # intended version: actions/checkout v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # intended version: actions/setup-node v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # intended version: actions/checkout v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # intended version: actions/setup-node v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - run: npm test

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # intended version: actions/checkout v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # intended version: actions/setup-node v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
